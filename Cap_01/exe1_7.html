<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        const jantar = Number(prompt("Valor do jantar R$: "));
        const garcom = jantar * 0.10;
        const total = garcom + jantar;
        alert("Taxa garçom R$: " + garcom.toFixed(2) + "\nTotal R$" + total.toFixed(2) );

        // O metodo toFixed() serve para indicar que o valor deve conter duas casas decimais


    </script>
    
</body>
</html>
