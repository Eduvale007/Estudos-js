<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        /*
        Elaborar um programa para uma pizzaria, o qual leia o valor total de uma
        conta e quantos clientes vão pagá-la.Calcule e informe o valor a ser pago
        por cliente.
        */

        const valorConta = Number(prompt("Valor conta: "));
        const numClientes = Number(prompt("Número de clientes: "));
        const valorPorCliente = (valorConta / numClientes);
        alert("Valor por cliente: " + valorPorCliente.toFixed(2));


    </script>
    
</body>
</html>
