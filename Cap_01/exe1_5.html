<body>

    <script>
    
    const num = prompt(); // le um dado de entrada
    const dobro = num * 2; // calcula o dobro
    alert("Dobro é: " + dobro); // exibe a resposta

    /* 
  Como estamos realizando uma operação de multiplicaçaõ, não é necessário converter a entrada de dados realizada
  pelo método prompt()-que retorna sempre um texto, em número. Contudo, se quisermos calcular o dobro do número
  a partir de uma operação de adição , a conversão é necessária. Para isso, pode-se utilizar o método Number()
  direto na entrada de dados, como demonstra a linha a seguir.  
    
        const num = Number(prompt("Numero:")) le o lado de entrada e converte para numero
    
   */





    </script>
    
</body>
</html>
